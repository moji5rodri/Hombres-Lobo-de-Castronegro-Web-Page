<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Los Hombres Lobo de Castronegro</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- ═══ PANTALLA: NICKNAME ═══ -->
<div id="screen-nickname" class="screen active">
  <div class="logo-wrap">
    <div class="moon-icon">🌕</div>
    <h1>Los Hombres Lobo<br><span>de Castronegro</span></h1>
    <p class="subtitle">El juego de deducción social</p>
  </div>
  <div class="card">
    <label>¿Cómo te llamas, aldeano?</label>
    <input id="inp-nickname" type="text" maxlength="16" placeholder="Tu apodo..." autocomplete="off"/>
    <button class="btn-primary" onclick="App.confirmNickname()">Continuar →</button>
  </div>
</div>

<!-- ═══ PANTALLA: MENÚ ═══ -->
<div id="screen-menu" class="screen">
  <div class="logo-small">🐺 <span id="menu-nick"></span></div>
  <div class="menu-options">
    <button class="btn-big" onclick="App.showCreate()">
      <span class="btn-icon">🏠</span>
      Crear Sala
    </button>
    <button class="btn-big secondary" onclick="App.showJoin()">
      <span class="btn-icon">🚪</span>
      Unirse a Sala
    </button>
  </div>
</div>

<!-- ═══ PANTALLA: CREAR SALA ═══ -->
<div id="screen-create" class="screen">
  <div class="top-bar">
    <button class="btn-back" onclick="App.goMenu()">← Volver</button>
    <h2>Crear Sala</h2>
  </div>
  <div class="card">
    <p>Se creará una sala con código único que podrás compartir con tus amigos.</p>
    <button class="btn-primary" onclick="App.createRoom()">🏠 Crear Sala</button>
  </div>
</div>

<!-- ═══ PANTALLA: UNIRSE ═══ -->
<div id="screen-join" class="screen">
  <div class="top-bar">
    <button class="btn-back" onclick="App.goMenu()">← Volver</button>
    <h2>Unirse a Sala</h2>
  </div>
  <div class="card">
    <label>Código de sala</label>
    <input id="inp-code" type="text" maxlength="5" placeholder="ABCDE" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;font-size:1.4rem;text-align:center"/>
    <button class="btn-primary" onclick="App.joinRoom()">🚪 Unirse</button>
  </div>
</div>

<!-- ═══ PANTALLA: LOBBY ═══ -->
<div id="screen-lobby" class="screen">
  <div class="top-bar">
    <h2>Sala: <span id="lobby-code" class="code-badge"></span></h2>
    <button class="btn-copy" onclick="App.copyCode()">📋 Copiar</button>
  </div>

  <div class="lobby-grid">
    <!-- Jugadores -->
    <div class="lobby-players card">
      <h3>Jugadores (<span id="player-count">0</span>/24)</h3>
      <div id="players-list"></div>
    </div>

    <!-- Roles (solo host) -->
    <div class="lobby-roles card" id="roles-panel">
      <h3>Cartas Especiales</h3>
      <p class="hint">Aldeanos y Lobos siempre están incluidos</p>
      <div class="roles-grid" id="roles-checkboxes"></div>
      <div id="host-controls" style="display:none;margin-top:16px">
        <button class="btn-primary" onclick="App.startGame()">⚔️ Iniciar Partida</button>
      </div>
    </div>
  </div>

  <!-- Chat lobby -->
  <div class="chat-section card">
    <h3>Chat</h3>
    <div id="lobby-chat" class="chat-box"></div>
    <div class="chat-input-row">
      <input id="lobby-chat-input" type="text" placeholder="Escribe algo..." maxlength="200" onkeydown="if(event.key==='Enter')App.sendChat()"/>
      <button onclick="App.sendChat()">Enviar</button>
    </div>
  </div>
</div>

<!-- ═══ PANTALLA: JUEGO ═══ -->
<div id="screen-game" class="screen">
  <!-- Header -->
  <div class="game-header">
    <div class="phase-indicator" id="phase-indicator">🌙 Noche</div>
    <div class="round-badge" id="round-badge">Ronda 1</div>
    <div id="my-role-badge" class="my-role"></div>
  </div>

  <div class="game-layout">
    <!-- Jugadores -->
    <div class="game-players card" id="game-players-panel">
      <h3>Jugadores</h3>
      <div id="game-players-list"></div>
    </div>

    <!-- Panel acción central -->
    <div class="game-center">
      <!-- Narrador/anuncios -->
      <div class="narrator-box card" id="narrator-box">
        <div id="narrator-msgs"></div>
      </div>
      <!-- Panel de acción del turno -->
      <div class="action-panel card" id="action-panel" style="display:none">
        <h3 id="action-title"></h3>
        <p id="action-desc"></p>
        <div id="action-targets"></div>
        <div id="action-extra"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="game-chat card">
      <div class="chat-tabs">
        <button class="chat-tab active" onclick="App.switchTab('general')" id="tab-general">General</button>
        <button class="chat-tab" onclick="App.switchTab('wolf')" id="tab-wolf" style="display:none">🐺 Lobos</button>
        <button class="chat-tab muted" onclick="App.switchTab('dead')" id="tab-dead" style="display:none">💀 Muertos</button>
      </div>
      <div id="game-chat-box" class="chat-box"></div>
      <div class="chat-input-row" id="chat-input-row">
        <input id="game-chat-input" type="text" placeholder="Escribe..." maxlength="200" onkeydown="if(event.key==='Enter')App.sendGameChat()"/>
        <button onclick="App.sendGameChat()">↑</button>
      </div>
    </div>
  </div>

  <!-- Host: saltar a votación -->
  <div id="host-skip-btn" style="display:none;text-align:center;margin-top:8px">
    <button class="btn-secondary" onclick="App.skipToVote()">⏩ Pasar a votación ya</button>
  </div>
</div>

<!-- ═══ PANTALLA: FIN ═══ -->
<div id="screen-end" class="screen">
  <div class="end-content">
    <div id="end-icon" class="end-icon"></div>
    <h2 id="end-title"></h2>
    <div id="end-reveal" class="end-reveal"></div>
    <button class="btn-primary" onclick="App.goMenu()">Volver al menú</button>
  </div>
</div>

<!-- Modal overlay -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-box">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div id="modal-targets"></div>
    <button id="modal-close" class="btn-secondary" onclick="App.closeModal()" style="display:none">Cerrar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
